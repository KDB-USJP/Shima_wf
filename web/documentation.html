<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shima - Documentation Portal</title>
    <!-- Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- Code Highlighting -->
    <link href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f0f12;
            --sidebar-bg: rgba(20, 20, 25, 0.8);
            --accent: #f2a900;
            --text-main: #e0e0e6;
            --text-dim: #90909a;
            --border: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Sidebar */
        aside {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 30px 0;
            z-index: 10;
        }

        .logo-area {
            padding: 0 25px 30px;
            border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .logo-area h1 {
            font-weight: 800;
            font-size: 22px;
            letter-spacing: -0.5px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #doc-tabs {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px;
        }

        .tab-btn {
            width: 100%;
            padding: 12px 15px;
            background: transparent;
            border: none;
            border-radius: 8px;
            color: var(--text-dim);
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tab-btn:hover {
            background: var(--glass-bg);
            color: #fff;
        }

        .tab-btn.active {
            background: rgba(242, 169, 0, 0.1);
            color: var(--accent);
            border-left: 3px solid var(--accent);
        }

        /* Main Content */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 60px 80px;
            scroll-behavior: smooth;
        }

        #content-area {
            max-width: 900px;
            margin: 0 auto;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        #content-area.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        /* Markdown Styling */
        #content-area h1 { font-size: 42px; margin-bottom: 30px; font-weight: 800; color: #fff; }
        #content-area h2 { font-size: 28px; margin: 40px 0 20px; font-weight: 700; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        #content-area h3 { font-size: 20px; margin: 30px 0 15px; font-weight: 600; color: #fff; }
        #content-area p { line-height: 1.7; margin-bottom: 20px; color: var(--text-main); font-size: 16px; }
        #content-area ul, #content-area ol { margin: 0 0 20px 25px; line-height: 1.7; }
        #content-area li { margin-bottom: 10px; }
        #content-area code { font-family: 'JetBrains Mono', monospace; background: rgba(255,255,255,0.08); padding: 2px 6px; border-radius: 4px; font-size: 0.9em; color: #f0f0f0; }
        #content-area pre { margin: 25px 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); }
        #content-area img { max-width: 100%; border-radius: 12px; margin: 20px 0; border: 1px solid var(--border); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        #content-area hr { border: none; border-top: 1px solid var(--border); margin: 50px 0; }
        #content-area table { width: 100%; border-collapse: collapse; margin-bottom: 30px; background: var(--glass-bg); border-radius: 8px; overflow: hidden; }
        #content-area th, #content-area td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        #content-area th { background: rgba(255,255,255,0.05); color: var(--accent); font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

        /* Loader */
        .loader {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: none;
        }
    </style>
</head>
<body>

    <aside>
        <div class="logo-area">
            <h1><span>📜</span> SHIMA DOCS</h1>
        </div>
        <div id="doc-tabs">
            <!-- Dynamic Tabs -->
        </div>
    </aside>

    <main id="main-scroll">
        <div id="content-area">
            <!-- Rendered Markdown -->
        </div>
        <div class="loader" id="loader">Loading...</div>
    </main>

    <script>
        const tabsContainer = document.getElementById('doc-tabs');
        const contentArea = document.getElementById('content-area');
        const loader = document.getElementById('loader');
        const mainScroll = document.getElementById('main-scroll');

        async function init() {
            try {
                const response = await fetch('/shima/docs/list');
                const data = await response.json();
                
                if (data.files && data.files.length > 0) {
                    data.files.forEach((file, index) => {
                        const btn = document.createElement('button');
                        btn.className = 'tab-btn';
                        // Clean up name for display
                        let displayName = file.replace('.md', '').replace(/_/g, ' ').replace(/-/g, ' ');
                        btn.textContent = displayName.toUpperCase();
                        btn.onclick = () => loadDoc(file, btn);
                        tabsContainer.appendChild(btn);

                        // Load first by default
                        if (index === 0) loadDoc(file, btn);
                    });
                }
            } catch (err) {
                contentArea.innerHTML = `<h1>Error</h1><p>Failed to load documentation list. ${err.message}</p>`;
                contentArea.classList.add('loaded');
            }
        }

        async function loadDoc(filename, btn) {
            // UI Updates
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            contentArea.classList.remove('loaded');
            loader.style.display = 'block';

            try {
                const response = await fetch(`/shima/docs/read/${filename}`);
                const markdown = await response.text();
                
                // Parse Markdown
                contentArea.innerHTML = marked.parse(markdown);
                
                // Highlight Code
                Prism.highlightAllUnder(contentArea);
                
                // Finish
                setTimeout(() => {
                    loader.style.display = 'none';
                    contentArea.classList.add('loaded');
                    mainScroll.scrollTop = 0;
                }, 100);

            } catch (err) {
                contentArea.innerHTML = `<h1>Error</h1><p>Failed to load ${filename}. ${err.message}</p>`;
                loader.style.display = 'none';
                contentArea.classList.add('loaded');
            }
        }

        init();
    </script>
</body>
</html>
